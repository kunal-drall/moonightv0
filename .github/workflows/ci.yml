name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SCARB_VERSION: "2.9.2"
  SNFORGE_VERSION: "0.35.0"
  NODE_VERSION: "20"

jobs:
  contracts-build:
    name: Build Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Build contracts
        run: scarb build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: packages/contracts/target/dev/

  contracts-test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Run unit tests
        run: |
          chmod +x ../../scripts/test-unit.sh
          ../../scripts/test-unit.sh

  contracts-test-integration:
    name: Integration Tests (snforge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install Starknet Foundry
        uses: foundry-rs/setup-snfoundry@v3
        with:
          starknet-foundry-version: ${{ env.SNFORGE_VERSION }}

      - name: Enable snforge_std
        run: |
          sed -i 's/# snforge_std/snforge_std/' Scarb.toml
          # Add snforge test target to avoid conflicts with inline #[cfg(test)] tests
          echo '' >> Scarb.toml
          echo '[[test]]' >> Scarb.toml
          echo 'test-type = "integration"' >> Scarb.toml

      - name: Run integration tests
        run: snforge test

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @moonight/frontend build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: packages/frontend/.next/

  frontend-lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @moonight/frontend lint

  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check & build
        run: pnpm --filter @moonight/backend build

  docs-build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @moonight/docs build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [contracts-build, frontend-build, backend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t moonight-frontend:${{ github.sha }} packages/frontend/

      - name: Build backend image
        run: docker build -t moonight-backend:${{ github.sha }} packages/backend/
